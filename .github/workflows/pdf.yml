name: 每日生成PDF并发布到Release
on:
  workflow_dispatch:
  schedule:
    - cron: "0 23 * * *"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set git config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install reportlab pillow

      - name: Run PDF generator
        run: python gen_tweet_pdf.py

      # 上传 PDF 到 GitHub Release（固定标签 latest-pdf，每次覆盖）
      - name: Upload PDF to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-pdf
          name: 最新推文合集PDF
          body: 自动定时生成，每日更新
          files: pdf_output/推文合集.pdf
          overwrite: true
          make_latest: false
