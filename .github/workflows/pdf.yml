name: 每日生成推文PDF
on:
  # 支持手动触发
  workflow_dispatch:
  # 定时：UTC 23:00 = 北京时间次日 07:00，每天执行一次
  schedule:
    - cron: "0 23 * * *"

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. 拉取整个仓库代码 & 数据
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 配置 Git 提交身份
      - name: Set git config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # 3. 配置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 4. 安装 PDF 依赖
      - name: Install dependencies
        run: |
          pip install reportlab pillow

      # 5. 执行 PDF 生成脚本（自动读 tweet_data、按日期命名）
      - name: Run PDF generator
        run: python gen_tweet_pdf.py

      # 6. 提交 PDF 文件回仓库
      - name: Commit & Push PDF
        run: |
          git add pdf_output/
          git commit -m "docs: 每日自动生成推文PDF $(date +%Y-%m-%d)" || exit 0
          git push origin main
